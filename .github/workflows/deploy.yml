name: Deployment
on: workflow_dispatch
env:
  MONGODB_DB_NAME: my-mongo-db
jobs:
  test:
    environment: development
    env:
      MONGODB_CLUSTER_ADDRESS: my-cluster.s5jn6ii.mongodb.net
      MONGODB_USERNAME: arunrg
      MONGODB_PASSWORD: Password191290
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: echo "MONGODB_USERNAME:" ${{env.MONGODB_USERNAME}}
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "MONGODB_NAME:" ${{env.MONGODB_DB_NAME}}
